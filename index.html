<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Музыкальная открытка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        /* Фоновое фото */
        .background-photo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('foto.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Полупрозрачный слой */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        /* Контейнер для текста */
        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            padding: 20px;
        }

        .message-text {
            color: black;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px white, 0 0 5px white;
            max-width: 90%;
            word-wrap: break-word;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .message-text.visible {
            opacity: 1;
        }

        /* 3D Сердце из текста в правом верхнем углу */
        .heart-3d {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
            transform-style: preserve-3d;
            transform: rotate(15deg) rotateX(10deg);
        }

        /* Внешний контур сердца */
        .heart-shape {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        /* Верхние части сердца */
        .heart-top {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: -5px;
        }

        /* Лепестки сердца */
        .heart-lobe {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: rotate(-5deg);
        }

        .heart-lobe:last-child {
            transform: rotate(5deg);
        }

        /* Нижняя часть сердца */
        .heart-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -10px;
        }

        /* Строки текста, образующие сердце */
        .heart-text-row {
            display: flex;
            gap: 2px;
            justify-content: center;
            animation: glow 2s ease-in-out infinite;
        }

        .heart-letter {
            font-size: 12px;
            font-weight: bold;
            color: #ff3366;
            text-shadow: 
                0 0 5px #ff3366,
                0 0 10px #ff3366,
                2px 2px 2px rgba(0,0,0,0.3);
            transform-style: preserve-3d;
            animation: letterFloat 2s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.1s);
            display: inline-block;
            width: 14px;
            text-align: center;
            font-family: 'Arial', sans-serif;
        }

        /* 3D эффект для букв */
        .heart-letter::before {
            content: attr(data-letter);
            position: absolute;
            transform: translateZ(-2px);
            opacity: 0.5;
            color: #990033;
        }

        .heart-letter::after {
            content: attr(data-letter);
            position: absolute;
            transform: translateZ(2px);
            opacity: 0.8;
            color: #ff6699;
        }

        /* Анимации */
        @keyframes float {
            0%, 100% { transform: rotate(15deg) rotateX(10deg) translateY(0px); }
            50% { transform: rotate(15deg) rotateX(10deg) translateY(-5px); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            35% { transform: scale(1); }
            45% { transform: scale(1.05); }
            55% { transform: scale(1); }
        }

        @keyframes letterFloat {
            0%, 100% { transform: translateZ(0) rotateY(0deg); }
            50% { transform: translateZ(5px) rotateY(10deg); }
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        /* Финальная открытка */
        .final-card {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background-color: black;
            z-index: 20;
        }

        .final-card img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            object-fit: contain;
        }

        /* Кнопка запуска */
        .hint {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 15;
            cursor: pointer;
            border: 1px solid white;
        }

        @media (max-width: 600px) {
            .message-text {
                font-size: 2rem;
            }
            .heart-3d {
                width: 90px;
                height: 90px;
            }
            .heart-letter {
                font-size: 9px;
                width: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновое фото -->
    <div class="background-photo"></div>
    
    <!-- Полупрозрачный слой -->
    <div class="overlay"></div>

    <!-- 3D Сердце в правом верхнем углу -->
    <div class="heart-3d">
        <div class="heart-shape">
            <div class="heart-top">
                <div class="heart-lobe">
                    <div class="heart-text-row">
                        <span class="heart-letter" data-letter="H" style="--i:1">H</span>
                        <span class="heart-letter" data-letter="a" style="--i:2">a</span>
                        <span class="heart-letter" data-letter="p" style="--i:3">p</span>
                        <span class="heart-letter" data-letter="p" style="--i:4">p</span>
                        <span class="heart-letter" data-letter="y" style="--i:5">y</span>
                    </div>
                </div>
                <div class="heart-lobe">
                    <div class="heart-text-row">
                        <span class="heart-letter" data-letter="B" style="--i:6">B</span>
                        <span class="heart-letter" data-letter="i" style="--i:7">i</span>
                        <span class="heart-letter" data-letter="r" style="--i:8">r</span>
                        <span class="heart-letter" data-letter="t" style="--i:9">t</span>
                        <span class="heart-letter" data-letter="h" style="--i:10">h</span>
                    </div>
                </div>
            </div>
            <div class="heart-bottom">
                <div class="heart-text-row">
                    <span class="heart-letter" data-letter="d" style="--i:11">d</span>
                    <span class="heart-letter" data-letter="a" style="--i:12">a</span>
                    <span class="heart-letter" data-letter="y" style="--i:13">y</span>
                    <span class="heart-letter" data-letter="!" style="--i:14">!</span>
                    <span class="heart-letter" data-letter="❤" style="--i:15">❤</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Текст -->
    <div class="content">
        <div id="messageDisplay" class="message-text"></div>
    </div>

    <!-- Финальная открытка -->
    <div id="finalCard" class="final-card">
        <img src="foto.jpg" alt="Фото">
    </div>

    <!-- Кнопка запуска -->
    <div class="hint" id="startHint">🔊 Начать</div>

    <!-- Музыка -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- ТВОЙ ТЕКСТ ---
        const messages = [
            "Поздравляю с днем рождения!",
            "Желаю счастья и здоровья",
            "Никогда не грустить",
            "Спасибо, что ты есть ❤️"
        ];
        
        // --- НАСТРОЙКИ ВРЕМЕНИ ---
        const totalTime = 16;
        const delayBeforeFinalCard = 1;
        
        const messageDuration = (totalTime / messages.length) * 1000;

        const audio = document.getElementById('bgMusic');
        const messageDisplay = document.getElementById('messageDisplay');
        const finalCard = document.getElementById('finalCard');
        const startHint = document.getElementById('startHint');
        
        let index = 0;
        let interval;

        function showMessage() {
            if (index < messages.length) {
                messageDisplay.textContent = messages[index];
                messageDisplay.classList.add('visible');
                index++;
            } else {
                clearInterval(interval);
                messageDisplay.classList.remove('visible');
                setTimeout(() => {
                    finalCard.style.display = 'flex';
                }, delayBeforeFinalCard * 1000);
            }
        }

        function start() {
            startHint.style.display = 'none';
            audio.play();
            
            index = 0;
            messageDisplay.classList.remove('visible');
            
            setTimeout(() => {
                showMessage();
            }, 500);
            
            interval = setInterval(showMessage, messageDuration);
        }

        startHint.addEventListener('click', start);
        document.body.addEventListener('click', function() {
            if (startHint.style.display !== 'none') {
                start();
            }
        });
    </script>
</body>
</html>
