<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Музыкальная открытка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        /* Фоновое фото (вертикальное) */
        .background-photo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('foto.jpg');
            background-size: contain;  /* Фото видно целиком */
            background-position: center center;
            background-repeat: no-repeat;
            background-color: black;
            z-index: 1;
        }

        /* Полупрозрачный слой для читаемости текста */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        /* Контейнер для основного текста */
        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            padding: 20px;
        }

        .message-text {
            color: black;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px white, 0 0 5px white;
            max-width: 90%;
            word-wrap: break-word;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .message-text.visible {
            opacity: 1;
        }

        /* ОБЩИЙ СТИЛЬ ДЛЯ ВСЕХ УГЛОВЫХ НАДПИСЕЙ */
        .corner-text {
            position: fixed;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff3333,
                0 0 30px #ff6666;
            white-space: nowrap;
            z-index: 10;
            animation: pulse 1.5s ease-in-out infinite;
            transform-origin: center;
            letter-spacing: 2px;
        }

        /* ЛЕВЫЙ ВЕРХНИЙ УГОЛ */
        .corner-tl {
            top: 30px;
            left: 30px;
            transform: rotate(5deg); /* Немного повернут вправо */
        }

        /* ПРАВЫЙ ВЕРХНИЙ УГОЛ */
        .corner-tr {
            top: 30px;
            right: 30px;
            transform: rotate(-5deg); /* Немного повернут вправо (отрицательный угол = против часовой, но нам нужно вправо) */
            /* Для правого угла чтобы текст был повернут вправо (по часовой), используем rotate(5deg) */
            transform: rotate(5deg);
        }

        /* ЛЕВЫЙ НИЖНИЙ УГОЛ */
        .corner-bl {
            bottom: 30px;
            left: 30px;
            transform: rotate(5deg); /* Повернут вправо */
        }

        /* ПРАВЫЙ НИЖНИЙ УГОЛ */
        .corner-br {
            bottom: 30px;
            right: 30px;
            transform: rotate(5deg); /* Повернут вправо */
        }

        /* Анимация пульсации */
        @keyframes pulse {
            0%, 100% {
                opacity: 0.8;
                transform: scale(1) rotate(5deg);
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff3333;
            }
            50% {
                opacity: 1;
                transform: scale(1.1) rotate(5deg);
                text-shadow: 0 0 20px #ff0000, 0 0 40px #ff6666, 0 0 60px #ff9999;
            }
        }

        /* Финальная открытка */
        .final-card {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background-color: black;
            z-index: 20;
        }

        .final-card img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            object-fit: contain;
        }

        /* Кнопка запуска */
        .hint {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 15;
            cursor: pointer;
            border: 1px solid white;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 600px) {
            .message-text {
                font-size: 2rem;
            }
            .corner-text {
                font-size: 1.2rem;
            }
            .corner-tl {
                top: 15px;
                left: 15px;
            }
            .corner-tr {
                top: 15px;
                right: 15px;
            }
            .corner-bl {
                bottom: 15px;
                left: 15px;
            }
            .corner-br {
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновое фото (вертикальное) -->
    <div class="background-photo"></div>
    
    <!-- Полупрозрачный слой -->
    <div class="overlay"></div>

    <!-- ПУЛЬСИРУЮЩИЕ НАДПИСИ ПО УГЛАМ -->
    <div class="corner-text corner-tl">С днем рождения!</div>
    <div class="corner-text corner-tr">С днем рождения!</div>
    <div class="corner-text corner-bl">С днем рождения!</div>
    <div class="corner-text corner-br">С днем рождения!</div>

    <!-- Основной текст по центру -->
    <div class="content">
        <div id="messageDisplay" class="message-text"></div>
    </div>

    <!-- Финальная открытка -->
    <div id="finalCard" class="final-card">
        <img src="foto.jpg" alt="Фото">
    </div>

    <!-- Кнопка запуска -->
    <div class="hint" id="startHint">🔊 Начать</div>

    <!-- Музыка -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- ТВОЙ ТЕКСТ (можешь изменить) ---
        const messages = [
            "Поздравляю с днем рождения!",
            "Желаю счастья и здоровья",
            "Никогда не грустить",
            "Спасибо, что ты есть ❤️"
        ];
        
        // --- НАСТРОЙКИ ВРЕМЕНИ ---
        const totalTime = 9;
        const delayBeforeFinalCard = 1;
        
        const messageDuration = (totalTime / messages.length) * 1000;

        const audio = document.getElementById('bgMusic');
        const messageDisplay = document.getElementById('messageDisplay');
        const finalCard = document.getElementById('finalCard');
        const startHint = document.getElementById('startHint');
        
        let index = 0;
        let interval;

        function showMessage() {
            if (index < messages.length) {
                messageDisplay.textContent = messages[index];
                messageDisplay.classList.add('visible');
                index++;
            } else {
                clearInterval(interval);
                messageDisplay.classList.remove('visible');
                setTimeout(() => {
                    finalCard.style.display = 'flex';
                }, delayBeforeFinalCard * 1000);
            }
        }

        function start() {
            startHint.style.display = 'none';
            audio.play();
            
            index = 0;
            messageDisplay.classList.remove('visible');
            
            setTimeout(() => {
                showMessage();
            }, 500);
            
            interval = setInterval(showMessage, messageDuration);
        }

        startHint.addEventListener('click', start);
        document.body.addEventListener('click', function() {
            if (startHint.style.display !== 'none') {
                start();
            }
        });
    </script>
</body>
</html>
