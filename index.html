<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальная открытка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: black;
        }

        /* ФОН - теперь просто фото (вертикальное) */
        .background-photo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('foto.jpg');
            background-size: contain; /* Фото ВИДНО ЦЕЛИКОМ! */
            background-position: center center; /* По центру */
            background-repeat: no-repeat; /* Не повторяется */
            background-color: black; /* Чтобы края были черными */
            z-index: -100;
        }

        /* Контейнер для текста - ПО ЦЕНТРУ И ЧЕРНЫЙ */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: black;
            text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.9); /* Белая тень */
            z-index: 10;
            padding: 20px;
        }

        .message-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            min-height: 4rem;
        }

        .message-text.visible {
            opacity: 1;
        }

        /* Стили для финальной открытки (фото) */
        .final-card {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 100;
        }

        .final-card img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain; /* Фото целиком */
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            border: 5px solid white;
            animation: popIn 0.8s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Инструкция по клику */
        .hint {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 200;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .message-text {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ФОН - просто фото (вертикальное) -->
    <div class="background-photo"></div>

    <!-- Контейнер для текста -->
    <div class="content">
        <div id="messageDisplay" class="message-text"></div>
    </div>

    <!-- Финальная открытка (то же фото, но с эффектом) -->
    <div id="finalCard" class="final-card">
        <img src="foto.jpg" alt="Фото для тебя">
    </div>

    <!-- Подсказка для пользователя -->
    <div class="hint" id="startHint">🔊 Нажми сюда</div>

    <!-- Аудио плеер -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- ТВОЙ ТЕКСТ (можешь изменить) ---
            const messages = [
                "Привет, это поздравление для тебя",
                "Поздравляю с днем рождения!",
                "Желаю счастья, здоровья,", 
                "никогда не грустить",
                "и радоваться каждому дню!",
                "Спасибо, что ты есть ❤️"
            ];
            
            const messageDuration = 4000; // 4 секунды на фразу
            const delayBeforeFinalCard = 2000; // 2 секунды
            // --- КОНЕЦ НАСТРОЕК ---

            const audio = document.getElementById('bgMusic');
            const messageDisplay = document.getElementById('messageDisplay');
            const finalCard = document.getElementById('finalCard');
            const startHint = document.getElementById('startHint');
            
            let messageIndex = 0;
            let messageInterval;

            function showNextMessage() {
                if (messageIndex < messages.length) {
                    messageDisplay.textContent = messages[messageIndex];
                    messageDisplay.classList.add('visible');
                    messageIndex++;
                } else {
                    clearInterval(messageInterval);
                    messageDisplay.classList.remove('visible');
                    
                    setTimeout(() => {
                        finalCard.style.display = 'flex';
                    }, delayBeforeFinalCard);
                }
            }

            function resetMessages() {
                messageIndex = 0;
                messageDisplay.classList.remove('visible');
                if (messageInterval) {
                    clearInterval(messageInterval);
                }
            }

            function startExperience() {
                startHint.style.display = 'none';
                
                audio.play().catch(e => {
                    console.log("Ждем клик пользователя");
                });

                resetMessages();
                
                setTimeout(() => {
                    showNextMessage();
                }, 500);
                
                messageInterval = setInterval(showNextMessage, messageDuration);
            }

            startHint.addEventListener('click', function() {
                startExperience();
            });

            document.body.addEventListener('click', function() {
                if (startHint.style.display !== 'none') {
                    startExperience();
                }
            }, { once: true });

            audio.play().then(() => {
                startHint.style.display = 'none';
                resetMessages();
                setTimeout(() => {
                    showNextMessage();
                }, 500);
                messageInterval = setInterval(showNextMessage, messageDuration);
            }).catch(() => {
                console.log("Нажми на экран для запуска");
            });

        });
    </script>
</body>
</html>
