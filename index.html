<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Музыкальная открытка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        /* Фоновое фото */
        .background-photo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('foto.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Полупрозрачный слой */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        /* Контейнер для текста */
        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            padding: 20px;
        }

        .message-text {
            color: black;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px white, 0 0 5px white;
            max-width: 90%;
            word-wrap: break-word;
            opacity: 0;
            transition: opacity 0.5s ease; /* Более быстрая смена */
        }

        .message-text.visible {
            opacity: 1;
        }

        /* Финальная открытка */
        .final-card {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background-color: black;
            z-index: 4;
        }

        .final-card img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            object-fit: contain;
        }

        /* Кнопка запуска */
        .hint {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 5;
            cursor: pointer;
            border: 1px solid white;
        }

        @media (max-width: 600px) {
            .message-text {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновое фото -->
    <div class="background-photo"></div>
    
    <!-- Полупрозрачный слой -->
    <div class="overlay"></div>

    <!-- Текст -->
    <div class="content">
        <div id="messageDisplay" class="message-text"></div>
    </div>

    <!-- Финальная открытка -->
    <div id="finalCard" class="final-card">
        <img src="foto.jpg" alt="Фото">
    </div>

    <!-- Кнопка запуска -->
    <div class="hint" id="startHint">🔊 Начать</div>

    <!-- Музыка -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- ТВОЙ ТЕКСТ (можешь изменить) ---
        const messages = [
            "Поздравляю с днем рождения!",
            "Желаю счастья и здоровья",
            "Никогда не грустить",
            "Спасибо, что ты есть ❤️"
        ];
        
        // --- НАСТРОЙКИ ВРЕМЕНИ ---
        const totalTime = 16; // Общее время показа ВСЕХ строк в секундах
        const delayBeforeFinalCard = 1; // Задержка перед открыткой в секундах
        
        // Рассчитываем время на одну строку
        const messageDuration = (totalTime / messages.length) * 1000; // Переводим в миллисекунды
        // -----------------------------

        const audio = document.getElementById('bgMusic');
        const messageDisplay = document.getElementById('messageDisplay');
        const finalCard = document.getElementById('finalCard');
        const startHint = document.getElementById('startHint');
        
        let index = 0;
        let interval;

        console.log(`Всего строк: ${messages.length}`);
        console.log(`Время на строку: ${messageDuration}мс`);

        function showMessage() {
            if (index < messages.length) {
                messageDisplay.textContent = messages[index];
                messageDisplay.classList.add('visible');
                index++;
            } else {
                clearInterval(interval);
                messageDisplay.classList.remove('visible');
                setTimeout(() => {
                    finalCard.style.display = 'flex';
                }, delayBeforeFinalCard * 1000);
            }
        }

        function start() {
            startHint.style.display = 'none';
            audio.play();
            
            index = 0;
            messageDisplay.classList.remove('visible');
            
            setTimeout(() => {
                showMessage();
            }, 500);
            
            interval = setInterval(showMessage, messageDuration);
        }

        startHint.addEventListener('click', start);
        document.body.addEventListener('click', function() {
            if (startHint.style.display !== 'none') {
                start();
            }
        });
    </script>
</body>
</html>
