<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Музыкальная открытка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        /* Фоновое фото */
        .background-photo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('foto.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Полупрозрачный слой */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        /* Контейнер для текста */
        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            padding: 20px;
        }

        .message-text {
            color: black;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px white, 0 0 5px white;
            max-width: 90%;
            word-wrap: break-word;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .message-text.visible {
            opacity: 1;
        }

        /* Контейнер для сердца в правом верхнем углу */
        .heart-container {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }

        /* Сетка для построения сердца */
        .heart-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        /* Строки сердца */
        .heart-row {
            display: flex;
            gap: 2px;
            justify-content: center;
        }

        /* Буквы сердца */
        .heart-letter {
            font-size: 14px;
            font-weight: bold;
            color: #ff3366;
            text-shadow: 
                0 0 5px #ff3366,
                0 0 10px #ff3366,
                2px 2px 4px rgba(0,0,0,0.3);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.05s);
            transform-style: preserve-3d;
            transform: rotateY(0deg) rotateX(0deg);
            transition: transform 0.3s;
        }

        /* 3D эффект при наведении */
        .heart-letter:hover {
            transform: rotateY(180deg) rotateX(10deg);
            color: #ff99cc;
        }

        /* Анимации */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                text-shadow: 0 0 5px #ff3366, 0 0 10px #ff3366;
            }
            50% { 
                transform: scale(1.1);
                text-shadow: 0 0 10px #ff6699, 0 0 20px #ff3366;
            }
        }

        /* Финальная открытка */
        .final-card {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background-color: black;
            z-index: 20;
        }

        .final-card img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            object-fit: contain;
        }

        /* Кнопка запуска */
        .hint {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 15;
            cursor: pointer;
            border: 1px solid white;
        }

        @media (max-width: 600px) {
            .message-text {
                font-size: 2rem;
            }
            .heart-container {
                width: 120px;
                height: 120px;
            }
            .heart-letter {
                font-size: 11px;
                width: 14px;
                height: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновое фото -->
    <div class="background-photo"></div>
    
    <!-- Полупрозрачный слой -->
    <div class="overlay"></div>

    <!-- 3D Сердце в правом верхнем углу -->
    <div class="heart-container">
        <div class="heart-grid">
            <!-- Строка 1: вершины сердца -->
            <div class="heart-row">
                <span class="heart-letter" style="--i:1">❤</span>
                <span class="heart-letter" style="--i:2"> </span>
                <span class="heart-letter" style="--i:3"> </span>
                <span class="heart-letter" style="--i:4"> </span>
                <span class="heart-letter" style="--i:5">❤</span>
            </div>
            
            <!-- Строка 2 -->
            <div class="heart-row">
                <span class="heart-letter" style="--i:6">H</span>
                <span class="heart-letter" style="--i:7">a</span>
                <span class="heart-letter" style="--i:8">p</span>
                <span class="heart-letter" style="--i:9">p</span>
                <span class="heart-letter" style="--i:10">y</span>
                <span class="heart-letter" style="--i:11">❤</span>
            </div>
            
            <!-- Строка 3 -->
            <div class="heart-row">
                <span class="heart-letter" style="--i:12">B</span>
                <span class="heart-letter" style="--i:13">i</span>
                <span class="heart-letter" style="--i:14">r</span>
                <span class="heart-letter" style="--i:15">t</span>
                <span class="heart-letter" style="--i:16">h</span>
                <span class="heart-letter" style="--i:17">d</span>
                <span class="heart-letter" style="--i:18">a</span>
                <span class="heart-letter" style="--i:19">y</span>
            </div>
            
            <!-- Строка 4 -->
            <div class="heart-row">
                <span class="heart-letter" style="--i:20">t</span>
                <span class="heart-letter" style="--i:21">o</span>
                <span class="heart-letter" style="--i:22"> </span>
                <span class="heart-letter" style="--i:23">y</span>
                <span class="heart-letter" style="--i:24">o</span>
                <span class="heart-letter" style="--i:25">u</span>
                <span class="heart-letter" style="--i:26">!</span>
            </div>
            
            <!-- Строка 5 -->
            <div class="heart-row">
                <span class="heart-letter" style="--i:27">❤</span>
                <span class="heart-letter" style="--i:28"> </span>
                <span class="heart-letter" style="--i:29"> </span>
                <span class="heart-letter" style="--i:30"> </span>
                <span class="heart-letter" style="--i:31">❤</span>
            </div>
            
            <!-- Строка 6 (нижняя часть сердца) -->
            <div class="heart-row">
                <span class="heart-letter" style="--i:32"> </span>
                <span class="heart-letter" style="--i:33">❤</span>
                <span class="heart-letter" style="--i:34"> </span>
                <span class="heart-letter" style="--i:35">❤</span>
                <span class="heart-letter" style="--i:36"> </span>
            </div>
            
            <!-- Строка 7 (самая нижняя точка) -->
            <div class="heart-row">
                <span class="heart-letter" style="--i:37"> </span>
                <span class="heart-letter" style="--i:38"> </span>
                <span class="heart-letter" style="--i:39">❤</span>
                <span class="heart-letter" style="--i:40"> </span>
                <span class="heart-letter" style="--i:41"> </span>
            </div>
        </div>
    </div>

    <!-- Текст -->
    <div class="content">
        <div id="messageDisplay" class="message-text"></div>
    </div>

    <!-- Финальная открытка -->
    <div id="finalCard" class="final-card">
        <img src="foto.jpg" alt="Фото">
    </div>

    <!-- Кнопка запуска -->
    <div class="hint" id="startHint">🔊 Начать</div>

    <!-- Музыка -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- ТВОЙ ТЕКСТ ---
        const messages = [
            "Поздравляю с днем рождения!",
            "Желаю счастья и здоровья",
            "Никогда не грустить",
            "Спасибо, что ты есть ❤️"
        ];
        
        // --- НАСТРОЙКИ ВРЕМЕНИ ---
        const totalTime = 16;
        const delayBeforeFinalCard = 1;
        
        const messageDuration = (totalTime / messages.length) * 1000;

        const audio = document.getElementById('bgMusic');
        const messageDisplay = document.getElementById('messageDisplay');
        const finalCard = document.getElementById('finalCard');
        const startHint = document.getElementById('startHint');
        
        let index = 0;
        let interval;

        function showMessage() {
            if (index < messages.length) {
                messageDisplay.textContent = messages[index];
                messageDisplay.classList.add('visible');
                index++;
            } else {
                clearInterval(interval);
                messageDisplay.classList.remove('visible');
                setTimeout(() => {
                    finalCard.style.display = 'flex';
                }, delayBeforeFinalCard * 1000);
            }
        }

        function start() {
            startHint.style.display = 'none';
            audio.play();
            
            index = 0;
            messageDisplay.classList.remove('visible');
            
            setTimeout(() => {
                showMessage();
            }, 500);
            
            interval = setInterval(showMessage, messageDuration);
        }

        startHint.addEventListener('click', start);
        document.body.addEventListener('click', function() {
            if (startHint.style.display !== 'none') {
                start();
            }
        });
    </script>
</body>
</html>
