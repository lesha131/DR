<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальная открытка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: black;
        }

        /* Контейнер для фонового видео (или фото) */
        #background-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url('foto.jpg'); /* Фото на случай если видео не грузится */
            object-fit: cover;
        }

        /* Затемнение - делаем прозрачным */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0); /* Прозрачный */
            z-index: -50;
        }

        /* Контейнер для текста - ПО ЦЕНТРУ И ЧЕРНЫЙ */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: black; /* Черный текст */
            text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.8); /* Белая тень для читаемости */
            z-index: 10;
            padding: 20px;
        }

        .message-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            min-height: 4rem;
        }

        .message-text.visible {
            opacity: 1;
        }

        /* Стили для финальной открытки (фото) */
        .final-card {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .final-card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain; /* Фото целиком, без обрезания */
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            border: 5px solid white;
            animation: popIn 0.8s ease-out;
            background-color: black;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Инструкция по клику */
        .hint {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 200;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .message-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- 1. Фоновое ВИДЕО (или ФОТО) -->
    <video autoplay muted loop id="background-video" poster="foto.jpg">
        <source src="video.mp4" type="video/mp4">
        Твой браузер не поддерживает видео.
    </video>

    <!-- Затемняющий слой (теперь прозрачный) -->
    <div class="overlay"></div>

    <!-- Контейнер для текста -->
    <div class="content">
        <div id="messageDisplay" class="message-text"></div>
    </div>

    <!-- Финальная открытка (ФОТО) -->
    <div id="finalCard" class="final-card">
        <img src="foto.jpg" alt="Фото для тебя">
    </div>

    <!-- Подсказка для пользователя -->
    <div class="hint" id="startHint">🔊 Нажми здесь, чтобы включить музыку и начать</div>

    <!-- Аудио плеер -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
        Твой браузер не поддерживает аудио.
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- НАСТРОЙКИ ---
            const messages = [
                "Привет, это поздравление для тебя",
                "Поздравляю с днем рождения тебя",
                "Желаю счастья, здоровья, никогда не грустить и радоваться всегда в жизни",
                "Спасибо, что ты есть.",
                "Я тебя люблю! ❤️"
            ];
            
            const messageDuration = 4000; // 4 секунды на фразу
            const delayBeforeFinalCard = 2000; // 2 секунды
            // --- КОНЕЦ НАСТРОЕК ---

            const audio = document.getElementById('bgMusic');
            const messageDisplay = document.getElementById('messageDisplay');
            const finalCard = document.getElementById('finalCard');
            const startHint = document.getElementById('startHint');
            
            let messageIndex = 0;
            let messageInterval;

            function showNextMessage() {
                if (messageIndex < messages.length) {
                    messageDisplay.textContent = messages[messageIndex];
                    messageDisplay.classList.add('visible');
                    messageIndex++;
                } else {
                    clearInterval(messageInterval);
                    messageDisplay.classList.remove('visible');
                    
                    setTimeout(() => {
                        finalCard.style.display = 'flex';
                    }, delayBeforeFinalCard);
                }
            }

            function resetMessages() {
                messageIndex = 0;
                messageDisplay.classList.remove('visible');
                if (messageInterval) {
                    clearInterval(messageInterval);
                }
            }

            function startExperience() {
                startHint.style.display = 'none';
                
                audio.play().catch(e => {
                    console.log("Автовоспроизведение заблокировано браузером. Но мы уже нажали на кнопку, значит всё ок.");
                });

                resetMessages();
                
                setTimeout(() => {
                    showNextMessage();
                }, 500);
                
                messageInterval = setInterval(showNextMessage, messageDuration);
            }

            startHint.addEventListener('click', function() {
                startExperience();
            });

            document.body.addEventListener('click', function() {
                if (startHint.style.display !== 'none') {
                    startExperience();
                }
            }, { once: true });

            audio.play().then(() => {
                startHint.style.display = 'none';
                resetMessages();
                setTimeout(() => {
                    showNextMessage();
                }, 500);
                messageInterval = setInterval(showNextMessage, messageDuration);
            }).catch(() => {
                console.log("Ожидание клика для запуска музыки.");
            });

        });
    </script>
</body>
</html>
